<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Stable Scroll FIX</title>

<style>
body {
  font-family: Arial;
  display:flex;
  gap:20px;
  padding:20px;
}

/* BOARD */
.board {
  width:400px;
  height:400px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:2px solid #222;
}

.cell {
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.w { background:#f0d9b5; }
.b { background:#b58863; }

/* PANEL */
.panel {
  width:360px;
}

/* ✔ FIX SCROLL (КЛЮЧЕВОЙ БЛОК) */
.list {
  height: 320px;        /* фиксируем высоту */
  overflow-y: auto;     /* включаем скролл */
  overflow-x: hidden;
  border:1px solid #ccc;
  background:#fff;
}

/* ITEMS */
.item {
  padding:6px;
  cursor:pointer;
}

.item:hover { background:#eee; }
.active { background:#cce5ff; }

button, input, select {
  width:100%;
  margin:5px 0;
}
</style>
</head>

<body>

<div>
  <div class="board" id="board"></div>
</div>

<div class="panel">

<h3>📚 Books</h3>
<select id="bookSelect"></select>

<h3>🔎 Search</h3>
<input id="search" placeholder="player...">

<h3>♟ Games</h3>
<div id="gameList" class="list"></div>

<button onclick="prevMove()">⏮ Prev</button>
<button onclick="nextMove()">▶ Next</button>
<button onclick="toggleAuto()" id="autoBtn">▶ Play</button>
<button onclick="resetGame()">⟲ Reset</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>

const boardEl = document.getElementById("board");
const gameList = document.getElementById("gameList");
const bookSelect = document.getElementById("bookSelect");
const search = document.getElementById("search");

let games = [];
let currentGame = 0;

let game = new Chess();
let history = [];
let index = 0;

let auto = null;
let playing = false;

/* BOOKS */
const books = {
  "Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Endgames": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_endgame_studies.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

for(let b in books){
  let o=document.createElement("option");
  o.value=books[b];
  o.textContent=b;
  bookSelect.appendChild(o);
}

/* BOARD */
function draw(){
  const b = game.board();
  boardEl.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let d=document.createElement("div");
      d.className="cell "+((r+c)%2?"b":"w");

      const p=b[r][c];
      d.textContent=p ? piece(p) : "";

      boardEl.appendChild(d);
    }
  }
}

function piece(p){
  const m={
    wp:"♙",wr:"♖",wn:"♘",wb:"♗",wq:"♕",wk:"♔",
    bp:"♟",br:"♜",bn:"♞",bb:"♝",bq:"♛",bk:"♚"
  };
  return m[p.color+p.type];
}

/* LOAD BOOK */
async function loadBook(url){
  const res = await fetch(url);
  const text = await res.text();

  // стабильное разделение
  games = text.split(/\n\n(?=\[)/).filter(x=>x.trim());

  renderList();
  loadGame(0);
}

/* LIST (без onclick — только dataset) */
function renderList(filter=""){
  gameList.innerHTML="";

  let num=1;

  games.forEach((g,i)=>{

    const w=g.match(/\[White "(.+)"\]/);
    const b=g.match(/\[Black "(.+)"\]/);

    const name = w&&b ? `${w[1]} vs ${b[1]}` : `Game ${num}`;

    if(!name.toLowerCase().includes(filter.toLowerCase())) return;

    const div=document.createElement("div");
    div.className="item";

    if(i===currentGame) div.classList.add("active");

    div.dataset.index = i;

    div.textContent = num + ". " + name;

    gameList.appendChild(div);

    num++;
  });
}

/* ✔ ДЕЛЕГИРОВАНИЕ КЛИКОВ (САМЫЙ СТАБИЛЬНЫЙ ВАРИАНТ) */
gameList.addEventListener("click", (e)=>{
  const item = e.target.closest(".item");
  if(!item) return;

  const i = parseInt(item.dataset.index);
  if(!isNaN(i)) loadGame(i);
});

/* LOAD GAME */
function loadGame(i){
  currentGame=i;

  let temp=new Chess();
  temp.load_pgn(games[i]);

  history=temp.history({verbose:true});

  game=new Chess();
  index=0;

  rebuild(0);
}

/* REBUILD */
function rebuild(i){
  game=new Chess();

  for(let k=0;k<i;k++){
    game.move(history[k].san);
  }

  index=i;

  draw();
}

/* CONTROLS */
function nextMove(){
  if(index<history.length) rebuild(index+1);
}

function prevMove(){
  if(index>0) rebuild(index-1);
}

function resetGame(){
  rebuild(0);
}

/* AUTO */
function toggleAuto(){
  const btn=document.getElementById("autoBtn");

  if(!playing){
    playing=true;
    btn.textContent="⏸ Pause";

    auto=setInterval(()=>{
      if(index<history.length){
        rebuild(index+1);
      } else stopAuto();
    },500);

  } else stopAuto();
}

function stopAuto(){
  clearInterval(auto);
  playing=false;
  document.getElementById("autoBtn").textContent="▶ Play";
}

/* EVENTS */
bookSelect.onchange=()=>loadBook(bookSelect.value);
search.oninput=()=>renderList(search.value);

/* INIT */
loadBook(bookSelect.value);

window.nextMove=nextMove;
window.prevMove=prevMove;
window.resetGame=resetGame;
window.toggleAuto=toggleAuto;

</script>

</body>
</html>
