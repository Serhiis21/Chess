<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess PGN Viewer PRO</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  display: flex;
  gap: 20px;
}

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

.panel {
  width: 260px;
}

.move {
  cursor: pointer;
  padding: 2px;
}

.move.active {
  background: yellow;
}

.last {
  outline: 2px solid red;
}

button, select {
  width: 100%;
  margin: 5px 0;
}
</style>
</head>

<body>

<div>
  <div class="board" id="board"></div>
</div>

<div class="panel">
  <h3>📚 Books</h3>
  <select id="bookSelect"></select>

  <button onclick="prevMove()">⏮ Prev</button>
  <button onclick="nextMove()">▶ Next</button>
  <button onclick="toggleAuto()">⏯ Auto</button>
  <button onclick="resetGame()">⟲ Reset</button>

  <h3>Moves</h3>
  <div id="moves"></div>

  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>

const boardEl = document.getElementById("board");
const movesEl = document.getElementById("moves");
const select = document.getElementById("bookSelect");
const status = document.getElementById("status");

let game = new Chess();
let history = [];
let index = 0;
let auto = null;
let lastMove = null;

/* BOOKS */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "100 Endgames": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_endgame_studies.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

/* INIT */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* BOARD RENDER */
function draw() {
  const b = game.board();
  boardEl.innerHTML = "";

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {

      const d = document.createElement("div");
      d.className = "cell " + ((r + c) % 2 ? "b" : "w");

      const p = b[r][c];
      d.textContent = p ? piece(p) : "";

      boardEl.appendChild(d);
    }
  }

  drawLastMove();
}

/* PIECES */
function piece(p) {
  const m = {
    wp:"♙", wr:"♖", wn:"♘", wb:"♗", wq:"♕", wk:"♔",
    bp:"♟", br:"♜", bn:"♞", bb:"♝", bq:"♛", bk:"♚"
  };
  return m[p.color + p.type];
}

/* LOAD PGN */
async function loadPGN(url) {
  const res = await fetch(url);
  const text = await res.text();

  game = new Chess();
  game.load_pgn(text);

  history = game.history();
  index = 0;

  renderMoves();
  rebuild(0);
}

/* REBUILD (100% SAFE) */
function rebuild(to) {
  game = new Chess();
  lastMove = null;

  for (let i = 0; i < to; i++) {
    const m = game.move(history[i]);
    if (i === to - 1) lastMove = m;
  }

  index = to;

  draw();
  highlight();
  status.innerText = `${index}/${history.length}`;
}

/* MOVES LIST */
function renderMoves() {
  movesEl.innerHTML = "";

  history.forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "move";
    div.innerText = (i + 1) + ". " + m;
    div.onclick = () => rebuild(i + 1);
    movesEl.appendChild(div);
  });

  highlight();
}

/* HIGHLIGHT MOVE */
function highlight() {
  document.querySelectorAll(".move").forEach((el, i) => {
    el.classList.toggle("active", i === index - 1);
  });
}

/* LAST MOVE HIGHLIGHT */
function drawLastMove() {
  if (!lastMove) return;

  const cells = document.querySelectorAll(".cell");

  const from = sq(lastMove.from);
  const to = sq(lastMove.to);

  if (cells[from]) cells[from].classList.add("last");
  if (cells[to]) cells[to].classList.add("last");
}

function sq(s) {
  const file = s.charCodeAt(0) - 97;
  const rank = 8 - parseInt(s[1]);
  return rank * 8 + file;
}

/* CONTROLS */
function nextMove() {
  if (index < history.length) rebuild(index + 1);
}

function prevMove() {
  if (index > 0) rebuild(index - 1);
}

function resetGame() {
  rebuild(0);
}

/* AUTO PLAY */
function toggleAuto() {
  if (auto) {
    clearInterval(auto);
    auto = null;
    return;
  }

  auto = setInterval(() => {
    if (index < history.length) nextMove();
    else clearInterval(auto);
  }, 600);
}

/* EVENTS */
select.onchange = () => loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;
window.toggleAuto = toggleAuto;

loadPGN(select.value);

</script>

</body>
</html>
