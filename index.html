<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess PGN Stable PRO</title>

<style>
body { font-family: Arial; padding: 20px; display: flex; gap: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

.panel { width: 240px; }

.move { cursor: pointer; padding: 2px; }
.move.active { background: yellow; }

button, select { width: 100%; margin: 5px 0; }
</style>
</head>

<body>

<div>
  <div class="board" id="board"></div>
</div>

<div class="panel">
  <h3>📚 Книги</h3>
  <select id="bookSelect"></select>

  <button onclick="prevMove()">⏮ Prev</button>
  <button onclick="nextMove()">▶ Next</button>
  <button onclick="resetGame()">⟲ Reset</button>

  <h3>📖 Moves</h3>
  <div id="moves"></div>

  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>

const boardEl = document.getElementById("board");
const movesEl = document.getElementById("moves");
const select = document.getElementById("bookSelect");
const status = document.getElementById("status");

let game = new Chess();
let history = [];
let index = 0;

/* BOOKS */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "100 Endgame Studies": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_endgame_studies.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

/* INIT BOOKS */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* DRAW BOARD */
function draw() {
  const b = game.board();
  boardEl.innerHTML = "";

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {

      const d = document.createElement("div");
      d.className = "cell " + ((r + c) % 2 ? "b" : "w");

      const p = b[r][c];
      d.textContent = p ? unicode(p) : "";

      boardEl.appendChild(d);
    }
  }
}

/* PIECES */
function unicode(p) {
  const m = {
    wp:"♙", wr:"♖", wn:"♘", wb:"♗", wq:"♕", wk:"♔",
    bp:"♟", br:"♜", bn:"♞", bb:"♝", bq:"♛", bk:"♚"
  };
  return m[p.color + p.type];
}

/* LOAD PGN */
async function loadPGN(url) {
  const res = await fetch(url);
  const text = await res.text();

  game = new Chess();
  game.load_pgn(text);

  history = game.history();
  index = 0;

  game = new Chess();

  renderMoves();
  rebuild(0);
}

/* REBUILD POSITION */
function rebuild(to) {
  game = new Chess();

  for (let i = 0; i < to; i++) {
    game.move(history[i]);
  }

  index = to;

  draw();
  highlight();
  status.innerText = "Move " + index + "/" + history.length;
}

/* MOVES LIST */
function renderMoves() {
  movesEl.innerHTML = "";

  history.forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "move";
    div.innerText = (i + 1) + ". " + m;

    div.onclick = () => rebuild(i + 1);

    movesEl.appendChild(div);
  });

  highlight();
}

/* HIGHLIGHT */
function highlight() {
  document.querySelectorAll(".move").forEach((el, i) => {
    el.classList.toggle("active", i === index - 1);
  });
}

/* CONTROLS */
function nextMove() {
  if (index < history.length) {
    rebuild(index + 1);
  }
}

function prevMove() {
  if (index > 0) {
    rebuild(index - 1);
  }
}

function resetGame() {
  rebuild(0);
}

/* EVENTS */
select.onchange = () => loadPGN(select.value);

loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

</script>

</body>
</html>
