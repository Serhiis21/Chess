<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Viewer STABLE FINAL</title>

<style>
body { font-family: Arial; padding:20px; display:flex; gap:20px; }

.board {
  width:400px; height:400px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:2px solid #222;
}

.cell {
  width:50px; height:50px;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.w { background:#f0d9b5; }
.b { background:#b58863; }

.panel { width:360px; }

.list {
  max-height:220px;
  overflow:auto;
  border:1px solid #ccc;
}

.item {
  padding:6px;
  cursor:pointer;
}

.item:hover { background:#eee; }
.active { background:#cce5ff; }

.move-line { padding:3px; }
.move-line span { cursor:pointer; margin-left:6px; }

.move-active { background:yellow; }

.last { outline:2px solid red; }

input, button, select {
  width:100%;
  margin:5px 0;
}
</style>
</head>

<body>

<div>
  <div class="board" id="board"></div>
</div>

<div class="panel">

<h3>📚 Books</h3>
<select id="bookSelect"></select>

<h3>🔎 Search</h3>
<input id="search" placeholder="player name...">

<h3>♟ Games</h3>
<div id="gameList" class="list"></div>

<input type="range" id="slider" min="0" max="0" value="0">

<button onclick="prevMove()">⏮ Prev</button>
<button onclick="nextMove()">▶ Next</button>
<button id="autoBtn" onclick="toggleAuto()">▶ Play</button>
<button onclick="resetGame()">⟲ Reset</button>

<h3>Moves</h3>
<div id="moves"></div>

<div id="status"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>

const boardEl = document.getElementById("board");
const movesEl = document.getElementById("moves");
const gameList = document.getElementById("gameList");
const bookSelect = document.getElementById("bookSelect");
const search = document.getElementById("search");
const slider = document.getElementById("slider");
const status = document.getElementById("status");

let game = new Chess();
let history = [];
let index = 0;
let lastMove = null;

let games = [];
let currentGame = 0;

let auto = null;
let isPlaying = false;

/* BOOKS */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

for (let b in books) {
  const o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  bookSelect.appendChild(o);
}

/* DRAW BOARD */
function draw(){
  const b = game.board();
  boardEl.innerHTML = "";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const d=document.createElement("div");
      d.className="cell "+((r+c)%2?"b":"w");

      const p=b[r][c];
      d.textContent=p?piece(p):"";

      boardEl.appendChild(d);
    }
  }

  drawLast();
}

function piece(p){
  const m={
    wp:"♙",wr:"♖",wn:"♘",wb:"♗",wq:"♕",wk:"♔",
    bp:"♟",br:"♜",bn:"♞",bb:"♝",bq:"♛",bk:"♚"
  };
  return m[p.color+p.type];
}

/* LOAD BOOK */
async function loadBook(url){
  stopAuto();

  const res = await fetch(url);
  const text = await res.text();

  // надежное разбиение
  games = text.split(/\n(?=\[Event)/).filter(g => g.trim());

  renderGameList();
  loadGame(0);
}

/* GAME LIST */
function renderGameList(filter=""){
  gameList.innerHTML = "";

  games.forEach((g,i)=>{

    const w = g.match(/\[White "(.+)"\]/);
    const b = g.match(/\[Black "(.+)"\]/);

    const name = w && b ? `${w[1]} vs ${b[1]}` : `Game ${i+1}`;

    if(!name.toLowerCase().includes(filter.toLowerCase())) return;

    const div = document.createElement("div");
    div.className = "item";
    if(i === currentGame) div.classList.add("active");

    div.textContent = name;

    div.onclick = ()=>{
      currentGame = i;
      loadGame(i);
      renderGameList(search.value);
    };

    gameList.appendChild(div);
  });
}

/* LOAD GAME — СТАБИЛЬНО */
function loadGame(i){
  stopAuto();

  currentGame = i;

  const pgn = games[i].trim();

  let temp = new Chess();
  const ok = temp.load_pgn(pgn);

  if(!ok){
    alert("Ошибка PGN в партии #" + (i+1));
    return;
  }

  history = temp.history({ verbose:true });

  game = new Chess();
  index = 0;
  slider.max = history.length;

  renderMoves();
  rebuild(0);
}

/* REBUILD */
function rebuild(to){
  game = new Chess();
  lastMove = null;

  for(let i=0;i<to;i++){
    const m = game.move(history[i].san);
    if(i===to-1) lastMove = history[i];
  }

  index = to;
  slider.value = index;

  draw();
  highlight();
  status.innerText = index + "/" + history.length;
}

/* MOVES */
function renderMoves(){
  movesEl.innerHTML = "";

  for(let i=0;i<history.length;i+=2){
    const moveNum = (i/2)+1;

    const div = document.createElement("div");

    div.innerHTML = `
      <b>${moveNum}.</b>
      <span onclick="goMove(${i+1})">${history[i]?.san || ""}</span>
      <span onclick="goMove(${i+2})">${history[i+1]?.san || ""}</span>
    `;

    movesEl.appendChild(div);
  }
}

function goMove(i){
  stopAuto();
  rebuild(i);
}

/* HIGHLIGHT */
function highlight(){
  document.querySelectorAll(".move-line span").forEach((el,i)=>{
    el.classList.toggle("move-active", i===index-1);
  });
}

/* LAST MOVE */
function drawLast(){
  if(!lastMove) return;

  const cells=document.querySelectorAll(".cell");

  const from=sq(lastMove.from);
  const to=sq(lastMove.to);

  if(cells[from]) cells[from].classList.add("last");
  if(cells[to]) cells[to].classList.add("last");
}

function sq(s){
  return (8-+s[1])*8+(s.charCodeAt(0)-97);
}

/* CONTROLS */
function nextMove(){ stopAuto(); if(index<history.length) rebuild(index+1); }
function prevMove(){ stopAuto(); if(index>0) rebuild(index-1); }
function resetGame(){ stopAuto(); rebuild(0); }

/* AUTO */
function toggleAuto(){
  const btn = document.getElementById("autoBtn");

  if(!isPlaying){
    isPlaying = true;
    btn.innerText = "⏸ Pause";

    auto = setInterval(()=>{
      if(index < history.length){
        rebuild(index+1);
      } else {
        stopAuto();
      }
    }, 500);

  } else {
    stopAuto();
  }
}

function stopAuto(){
  clearInterval(auto);
  auto = null;
  isPlaying = false;
  document.getElementById("autoBtn").innerText = "▶ Play";
}

/* EVENTS */
bookSelect.onchange = ()=>loadBook(bookSelect.value);
search.oninput = ()=>renderGameList(search.value);
slider.oninput = ()=>{ stopAuto(); rebuild(+slider.value); };

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;
window.toggleAuto = toggleAuto;
window.goMove = goMove;

/* INIT */
loadBook(bookSelect.value);

</script>

</body>
</html>
