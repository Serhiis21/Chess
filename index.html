<script>

const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

const select = document.getElementById("bookSelect");
const status = document.getElementById("status");

/* стартовая позиция */
const startPosition = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

let boardEl = document.getElementById("board");
let boardState = [...startPosition];

let moves = [];
let index = 0;

/* отрисовка доски */
function draw() {
  boardEl.innerHTML = "";

  for (let i = 0; i < 64; i++) {
    let cell = document.createElement("div");

    let row = Math.floor(i / 8);
    let col = i % 8;

    cell.className = "cell " + ((row + col) % 2 ? "b" : "w");
    cell.textContent = boardState[i];

    boardEl.appendChild(cell);
  }
}

/* загрузка PGN */
async function loadPGN(url) {
  status.innerText = "Загрузка...";

  const res = await fetch(url);
  const text = await res.text();

  const gameText = text.split(/\n\n(?=\[Event)/)[0];

  moves = gameText
    .replace(/\[.*\]/g, "")
    .replace(/\d+\./g, "")
    .trim()
    .split(/\s+/)
    .filter(m => m && !m.includes("{"));

  index = 0;
  boardState = [...startPosition];
  draw();

  status.innerText = "Готово: " + moves.length + " ходов";
}

/* очень простой “движок” (упрощённый) */
function applyMove(move) {

  // ВАЖНО: упрощённо (для миниатюр и примеров)
  // полноценный chess engine можно добавить позже

  status.innerText = "Ход: " + move + " (" + index + ")";
}

/* перемотка */
function nextMove() {
  if (index < moves.length) {
    applyMove(moves[index]);
    index++;
  }
}

function prevMove() {
  if (index > 0) {
    index--;
    status.innerText = "Назад: " + index;
  }
}

function resetGame() {
  index = 0;
  boardState = [...startPosition];
  draw();
  status.innerText = "Сброс";
}

/* книги */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

select.onchange = () => loadPGN(select.value);

/* кнопки */
window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

select.dispatchEvent(new Event("change"));

</script>
