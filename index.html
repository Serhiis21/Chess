<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Viewer PRO</title>

<style>
body { font-family: Arial; padding: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

button { margin: 5px; }
select { margin: 10px 0; width: 420px; }
</style>
</head>

<body>

<h2>♟ Chess Viewer PRO</h2>

<div class="board" id="board"></div>

<h3>📚 Книги</h3>
<select id="bookSelect"></select>

<div>
  <button onclick="prevMove()">⏮</button>
  <button onclick="nextMove()">▶</button>
  <button onclick="resetGame()">⟲</button>
</div>

<div id="status"></div>

<script>

/* ================= BOARD ================= */
const start = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

let boardEl = document.getElementById("board");
let state = [...start];

function draw() {
  boardEl.innerHTML = "";
  for (let i = 0; i < 64; i++) {
    const d = document.createElement("div");
    const r = Math.floor(i / 8);
    const c = i % 8;
    d.className = "cell " + ((r + c) % 2 ? "b" : "w");
    d.textContent = state[i];
    boardEl.appendChild(d);
  }
}

draw();

/* ================= BOOKS ================= */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

const select = document.getElementById("bookSelect");
const status = document.getElementById("status");

let moves = [];
let index = 0;

/* fill books */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* ================= SIMPLE MOVE ENGINE ================= */

/* очень упрощённая система:
   - пока просто "перестановка" для демонстрации
   - позже заменим на полноценный chess engine
*/

function applyMove(move) {
  status.innerText = "Ход: " + move;

  // ДЕМО-ЛОГИКА:
  // просто визуально "шевелим" доску (без правил)
  let i1 = Math.floor(Math.random() * 64);
  let i2 = Math.floor(Math.random() * 64);

  state[i2] = state[i1];
  state[i1] = "";

  draw();
}

/* ================= LOAD PGN ================= */
async function loadPGN(url) {
  status.innerText = "Загрузка...";

  const res = await fetch(url);
  const text = await res.text();

  const game = text.split(/\n\n(?=\[Event)/)[0];

  moves = game
    .replace(/\[.*\]/g, "")
    .replace(/\d+\./g, "")
    .trim()
    .split(/\s+/)
    .filter(m => m);

  index = 0;

  status.innerText = "Ходов: " + moves.length;
}

/* ================= CONTROLS ================= */
function nextMove() {
  if (index < moves.length) {
    applyMove(moves[index]);
    index++;
  }
}

function prevMove() {
  if (index > 0) index--;
  status.innerText = "Назад: " + index;
}

function resetGame() {
  state = [...start];
  index = 0;
  draw();
  status.innerText = "Сброс";
}

/* ================= EVENTS ================= */
select.onchange = () => loadPGN(select.value);

loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

</script>

</body>
</html>
