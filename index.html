<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Library FIXED</title>

<style>
body { font-family: Arial; padding: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

button { margin: 5px; }
select { margin: 10px 0; }
</style>
</head>

<body>

<h2>♟ Chess Library</h2>

<!-- ДОСКА -->
<div class="board" id="board"></div>

<!-- КНИГИ -->
<h3>📚 Книги</h3>
<select id="bookSelect"></select>

<!-- КНОПКИ -->
<div>
  <button onclick="prevMove()">⏮</button>
  <button onclick="nextMove()">▶</button>
  <button onclick="resetGame()">⟲</button>
</div>

<div id="status"></div>

<script>

/* ================= BOARD ================= */
const start = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

const boardEl = document.getElementById("board");
const status = document.getElementById("status");
const select = document.getElementById("bookSelect");

let state = [...start];
let moves = [];
let index = 0;

/* рисуем доску */
function draw() {
  boardEl.innerHTML = "";

  for (let i = 0; i < 64; i++) {
    const cell = document.createElement("div");

    const r = Math.floor(i / 8);
    const c = i % 8;

    cell.className = "cell " + ((r + c) % 2 ? "b" : "w");
    cell.textContent = state[i];

    boardEl.appendChild(cell);
  }
}

draw();

/* ================= BOOKS ================= */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

/* добавляем книги */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* ================= PGN ================= */
async function loadPGN(url) {
  try {
    status.innerText = "Загрузка...";

    const res = await fetch(url);
    const text = await res.text();

    const game = text.split(/\n\n(?=\[Event)/)[0];

    moves = game
      .replace(/\[.*\]/g, "")
      .replace(/\d+\./g, "")
      .trim()
      .split(/\s+/)
      .filter(m => m);

    index = 0;

    status.innerText = "Ходов: " + moves.length;

  } catch (e) {
    status.innerText = "Ошибка загрузки";
  }
}

/* ================= CONTROLS ================= */
function nextMove() {
  if (index < moves.length) {
    status.innerText = "Ход: " + moves[index];
    index++;
  }
}

function prevMove() {
  if (index > 0) index--;
  status.innerText = "Назад: " + index;
}

function resetGame() {
  state = [...start];
  index = 0;
  draw();
  status.innerText = "Сброс";
}

/* ================= EVENTS ================= */
select.onchange = () => loadPGN(select.value);

/* init */
loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

</script>

</body>
</html>
