<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Library Stable Full</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

button { margin: 5px; }
select { margin: 10px 0; width: 420px; }
</style>
</head>

<body>

<h2>♟ Chess Library</h2>

<div class="board" id="board"></div>

<h3>📚 Книги</h3>
<select id="bookSelect"></select>

<div>
  <button onclick="prevMove()">⏮</button>
  <button onclick="nextMove()">▶</button>
  <button onclick="resetGame()">⟲</button>
</div>

<div id="status"></div>

<script>

/* ================= BOARD ================= */
const startPosition = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

const boardEl = document.getElementById("board");
const status = document.getElementById("status");
const select = document.getElementById("bookSelect");

let state = [...startPosition];
let moves = [];
let index = 0;

/* рисуем доску */
function drawBoard() {
  boardEl.innerHTML = "";

  for (let i = 0; i < 64; i++) {
    const cell = document.createElement("div");

    const r = Math.floor(i / 8);
    const c = i % 8;

    cell.className = "cell " + ((r + c) % 2 ? "b" : "w");
    cell.textContent = state[i];

    boardEl.appendChild(cell);
  }
}

drawBoard();

/* ================= BOOKS ================= */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "100 Endgame Studies": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_endgame_studies.pgn",
  "1001 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/1001_minis.pgn",
  "1002 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/1002_minis.pgn",
  "200 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/200_minis_du_mont.pgn",
  "600 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/600_minis.pgn",
  "700 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/700_minis.pgn",
  "Alekhine": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Alekhine.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn",
  "Fischer": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Fischer.pgn",
  "Lasker": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Lasker.pgn",
  "Morphy": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Morphy.pgn",
  "Petrosian": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Petrosian.pgn",
  "Tal": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Tal.pgn",
  "Steinitz": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Steinitz.pgn",
  "Steinitz Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Steinitz%20Best%20Games.pgn",
  "Tactics": "https://raw.githubusercontent.com/Serhiis21/Chess/main/tactics.pgn",
  "Modern Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/modern_minis.pgn"
};

/* ================= INIT SAFE ================= */
window.addEventListener("DOMContentLoaded", () => {

  // render books safely
  select.innerHTML = "";

  Object.entries(books).forEach(([name, url]) => {
    const opt = document.createElement("option");
    opt.value = url;
    opt.textContent = name;
    select.appendChild(opt);
  });

  console.log("BOOK COUNT:", select.options.length);

  loadPGN(select.value);
});

/* ================= PGN ================= */
async function loadPGN(url) {
  try {
    status.innerText = "Загрузка...";

    const res = await fetch(url);
    const text = await res.text();

    const game = text.split(/\n\n(?=\[Event)/)[0];

    moves = game
      .replace(/\[.*\]/g, "")
      .replace(/\d+\./g, "")
      .trim()
      .split(/\s+/)
      .filter(m => m);

    index = 0;

    status.innerText = "Ходов: " + moves.length;

  } catch (e) {
    status.innerText = "Ошибка загрузки";
  }
}

/* ================= CONTROLS ================= */
function nextMove() {
  if (index < moves.length) {
    status.innerText = "Ход: " + moves[index];
    index++;
  }
}

function prevMove() {
  if (index > 0) index--;
  status.innerText = "Назад: " + index;
}

function resetGame() {
  state = [...startPosition];
  index = 0;
  drawBoard();
  status.innerText = "Сброс";
}

/* events */
select.onchange = () => loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

</script>

</body>
</html>
