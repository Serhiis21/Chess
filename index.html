<div style="font-family:Arial; font-weight:bold; margin-bottom:10px;">
  ♟ Шахматная библиотека
</div>

<select id="gameSelect"></select>

<div style="margin:10px 0;">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<div id="board"></div>

<div id="moves"></div>

<script>

const pgnText = `
[Event "Game 1"]
[White "A"]
[Black "B"]

1. e4 e5 2. Nf3 Nc6 3. Bb5 a6

[Event "Game 2"]
[White "C"]
[Black "D"]

1. d4 d5 2. c4 e6 3. Nc3 Nf6
`;

let games = [];
let moves = [];
let index = 0;
let position = {};

// фигуры
const pieces = {
  wp:"♙", wn:"♘", wb:"♗", wr:"♖", wq:"♕", wk:"♔",
  bp:"♟", bn:"♞", bb:"♝", br:"♜", bq:"♛", bk:"♚"
};

function start() {
  return {
    a1:"wr", b1:"wn", c1:"wb", d1:"wq", e1:"wk", f1:"wb", g1:"wn", h1:"wr",
    a2:"wp", b2:"wp", c2:"wp", d2:"wp", e2:"wp", f2:"wp", g2:"wp", h2:"wp",
    a7:"bp", b7:"bp", c7:"bp", d7:"bp", e7:"bp", f7:"bp", g7:"bp", h7:"bp",
    a8:"br", b8:"bn", c8:"bb", d8:"bq", e8:"bk", f8:"bb", g8:"bn", h8:"br"
  };
}

function split() {
  return pgnText.split(/\n\n(?=\[Event)/).filter(g=>g.trim());
}

function parse(pgn) {
  return pgn.replace(/\[.*?\]/g,"")
    .replace(/\d+\./g,"")
    .trim()
    .split(/\s+/)
    .filter(x=>x);
}

function apply(move) {
  const files = ["a","b","c","d","e","f","g","h"];
  const from = files[Math.floor(Math.random()*8)] + (Math.random()>0.5?2:7);
  const to = files[Math.floor(Math.random()*8)] + (Math.random()>0.5?4:5);

  position[to] = position[from];
  delete position[from];
}

function draw() {
  const files = ["a","b","c","d","e","f","g","h"];
  let html = "<table style='border-collapse:collapse;'>";

  for (let r = 8; r >= 1; r--) {
    html += "<tr>";
    for (let f = 0; f < 8; f++) {
      const sq = files[f] + r;
      const dark = (r + f) % 2 === 0;

      html += `<td style="
        width:40px;height:40px;
        background:${dark ? "#769656" : "#eeeed2"};
        text-align:center;
        font-size:22px;
      ">${pieces[position[sq]] || ""}</td>`;
    }
    html += "</tr>";
  }

  html += "</table>";
  document.getElementById("board").innerHTML = html;

  document.getElementById("moves").innerHTML =
    moves.map((m,i)=> i===index ? "▶ "+m : m).join(" ");
}

function loadGame(i) {
  position = start();
  moves = parse(games[i]);
  index = 0;
  draw();
}

function next() {
  if (index < moves.length) {
    apply(moves[index]);
    index++;
    draw();
  }
}

function prev() {
  position = start();
  index = 0;

  for (let i = 0; i < index-1; i++) apply(moves[i]);

  draw();
}

function init() {
  games = split();

  const sel = document.getElementById("gameSelect");

  games.forEach((g,i)=>{
    const w = g.match(/\[White "(.*?)"\]/)?.[1];
    const b = g.match(/\[Black "(.*?)"\]/)?.[1];

    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = `${i+1}. ${w} vs ${b}`;
    sel.appendChild(opt);
  });

  sel.onchange = () => loadGame(sel.value);

  loadGame(0);
}

init();

</script>
