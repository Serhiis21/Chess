<div style="font-family:Arial; font-weight:bold; margin-bottom:10px;">
  ♟ Шахматная партия
</div>

<div style="margin-bottom:10px;">
  <button onclick="prevMove()">◀</button>
  <button onclick="nextMove()">▶</button>
</div>

<div id="board"></div>

<div id="moves" style="margin-top:10px; font-family:monospace;"></div>

<script>

const pgnText = `
[Event "Game 1"]
[White "A"]
[Black "B"]

1. e4 e5 2. Nf3 Nc6 3. Bb5 a6
`;

let position;
let moves = [];
let index = 0;

// фигуры
const pieces = {
  wp:"♙", wn:"♘", wb:"♗", wr:"♖", wq:"♕", wk:"♔",
  bp:"♟", bn:"♞", bb:"♝", br:"♜", bq:"♛", bk:"♚"
};

function startPos() {
  return {
    a1:"wr", b1:"wn", c1:"wb", d1:"wq", e1:"wk", f1:"wb", g1:"wn", h1:"wr",
    a2:"wp", b2:"wp", c2:"wp", d2:"wp", e2:"wp", f2:"wp", g2:"wp", h2:"wp",
    a7:"bp", b7:"bp", c7:"bp", d7:"bp", e7:"bp", f7:"bp", g7:"bp", h7:"bp",
    a8:"br", b8:"bn", c8:"bb", d8:"bq", e8:"bk", f8:"bb", g8:"bn", h8:"br"
  };
}

// простое применение хода (пока без шахматной логики)
function apply(move) {
  const files = ["a","b","c","d","e","f","g","h"];

  const from = files[Math.floor(Math.random()*8)] + (Math.random()>0.5?2:7);
  const to = files[Math.floor(Math.random()*8)] + (Math.random()>0.5?4:5);

  position[to] = position[from];
  delete position[from];
}

// парсер
function parse(pgn) {
  return pgn
    .replace(/\[.*?\]/g,"")
    .replace(/\d+\./g,"")
    .trim()
    .split(/\s+/)
    .filter(x=>x);
}

// доска
function draw() {
  const files = ["a","b","c","d","e","f","g","h"];
  let html = "<table style='border-collapse:collapse;'>";

  for (let r = 8; r >= 1; r--) {
    html += "<tr>";
    for (let f = 0; f < 8; f++) {
      const sq = files[f] + r;
      const dark = (r + f) % 2 === 0;

      html += `<td style="
        width:40px;height:40px;
        background:${dark ? "#769656" : "#eeeed2"};
        text-align:center;
        font-size:22px;
      ">${pieces[position[sq]] || ""}</td>`;
    }
    html += "</tr>";
  }

  html += "</table>";
  document.getElementById("board").innerHTML = html;

  document.getElementById("moves").innerHTML =
    moves.map((m,i)=> i===index ? "▶ " + m : m).join(" ");
}

// загрузка
function init() {
  position = startPos();
  moves = parse(pgnText);
  index = 0;
  draw();
}

// следующий ход
function nextMove() {
  if (index >= moves.length) return;
  apply(moves[index]);
  index++;
  draw();
}

// предыдущий ход
function prevMove() {
  position = startPos();
  index = 0;

  for (let i = 0; i < index-1; i++) {
    apply(moves[i]);
  }

  draw();
}

init();

</script>
