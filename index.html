<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess SAFE</title>

<style>
body { font-family: Arial; padding: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

button, select { margin: 5px 0; width: 420px; }
</style>
</head>

<body>

<h2>♟ Chess SAFE MODE</h2>

<div class="board" id="board"></div>

<h3>📚 Книги</h3>
<select id="bookSelect"></select>

<button onclick="nextMove()">▶ Next (demo)</button>

<div id="status"></div>

<script>

/* ===== BOARD ===== */
const boardEl = document.getElementById("board");
const status = document.getElementById("status");

const start = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

let state = [...start];

function draw() {
  boardEl.innerHTML = "";
  for (let i = 0; i < 64; i++) {
    const d = document.createElement("div");
    const r = Math.floor(i / 8);
    const c = i % 8;
    d.className = "cell " + ((r + c) % 2 ? "b" : "w");
    d.textContent = state[i];
    boardEl.appendChild(d);
  }
}

draw();

/* ===== BOOKS (SAFE) ===== */
const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

const select = document.getElementById("bookSelect");

for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* ===== DEMO MOVE ===== */
function nextMove() {
  // просто проверка что всё живо
  let i1 = Math.floor(Math.random() * 64);
  let i2 = Math.floor(Math.random() * 64);

  state[i2] = state[i1];
  state[i1] = "";

  draw();

  status.innerText = "demo move OK";
}

</script>

</body>
</html>
