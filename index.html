<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Stable</title>

<style>
body { font-family: Arial; padding: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }
</style>

</head>

<body>

<h2>♟ Chess Board (Stable Version)</h2>

<div class="board" id="board"></div>

<script>

const start = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

const board = document.getElementById("board");

for (let i = 0; i < 64; i++) {
  const cell = document.createElement("div");

  const row = Math.floor(i / 8);
  const col = i % 8;

  cell.className = "cell " + ((row + col) % 2 ? "b" : "w");
  cell.textContent = start[i];

  board.appendChild(cell);
}

</script>

</body>
</html>
