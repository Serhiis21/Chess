<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Library</title>

<!-- chessboard -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/css/chessboard.min.css">

<!-- библиотеки -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/js/chessboard.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
#board { width: 400px; margin-top: 20px; }
</style>
</head>

<body>

<h2>♟ Шахматная библиотека</h2>

<select id="book"></select>

<div id="board"></div>
<div id="info"></div>

<script>

const books = {
  "1001 Minis": "1001_minis.pgn",
  "100 Best Games": "100_best_games.pgn",
  "Capablanca": "Capablanca.pgn"
};

const select = document.getElementById("book");
const info = document.getElementById("info");

let game = new Chess();
let board = Chessboard('board', 'start');

/* список */
for (let b in books){
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* загрузка */
select.onchange = async () => {

  info.innerText = "Loading...";

  const res = await fetch(select.value);
  const text = await res.text();

  const firstGame = text.split(/\n\n(?=\[Event)/)[0];

  game.reset();
  game.load_pgn(firstGame);

  board.position(game.fen());

  info.innerText = "Готово";
};

select.dispatchEvent(new Event("change"));

</script>

</body>
</html>
