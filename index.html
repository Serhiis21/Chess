<h3>📚 Книги</h3>

<select id="bookSelect"></select>

<div style="margin-top:10px;">
  <button onclick="prevMove()">⏮</button>
  <button onclick="nextMove()">▶</button>
  <button onclick="resetGame()">⟲</button>
</div>

<div id="status" style="margin-top:10px;"></div>

<script>

const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

const select = document.getElementById("bookSelect");
const status = document.getElementById("status");

let moves = [];
let index = 0;

/* загрузка списка */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* загрузка PGN */
async function loadPGN(url) {
  status.innerText = "Загрузка...";

  try {
    const res = await fetch(url);
    const text = await res.text();

    const gameText = text.split(/\n\n(?=\[Event)/)[0];

    // простое извлечение ходов
    const movesText = gameText
      .replace(/\[.*\]/g, "")
      .replace(/\d+\./g, "")
      .trim()
      .split(/\s+/);

    moves = movesText.filter(m => m && !m.includes("{"));
    index = 0;

    status.innerText = "Загружено: " + moves.length + " ходов";

  } catch (e) {
    status.innerText = "Ошибка загрузки";
  }
}

select.onchange = () => loadPGN(select.value);

/* кнопки (пока просто заглушка — дальше подключим ходами) */
function nextMove() {
  if (index < moves.length) {
    index++;
    status.innerText = "Ход: " + index;
  }
}

function prevMove() {
  if (index > 0) {
    index--;
    status.innerText = "Ход: " + index;
  }
}

function resetGame() {
  index = 0;
  status.innerText = "Сброс";
}

select.dispatchEvent(new Event("change"));

</script>
