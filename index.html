<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>

const boardEl = document.getElementById("board");
const status = document.getElementById("status");
const select = document.getElementById("bookSelect");

const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

let game = new Chess();
let history = [];
let index = 0;

/* ===== DRAW ===== */
function draw() {
  const board = game.board();
  boardEl.innerHTML = "";

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement("div");
      const isDark = (r + c) % 2;
      cell.className = "cell " + (isDark ? "b" : "w");

      const piece = board[r][c];
      cell.textContent = piece ? unicode(piece) : "";

      boardEl.appendChild(cell);
    }
  }
}

function unicode(p) {
  const map = {
    wp:"♙", wr:"♖", wn:"♘", wb:"♗", wq:"♕", wk:"♔",
    bp:"♟", br:"♜", bn:"♞", bb:"♝", bq:"♛", bk:"♚"
  };
  return map[p.color + p.type];
}

/* ===== LOAD PGN ===== */
async function loadPGN(url) {
  status.innerText = "Загрузка...";

  const res = await fetch(url);
  const text = await res.text();

  game = new Chess();
  game.load_pgn(text);

  history = game.history();
  index = 0;

  game = new Chess();

  status.innerText = "Ходов: " + history.length;

  draw();
}

/* ===== APPLY POSITION ===== */
function rebuild(toIndex) {
  game = new Chess();

  for (let i = 0; i < toIndex; i++) {
    game.move(history[i]);
  }

  draw();
}

/* ===== CONTROLS ===== */
function nextMove() {
  if (index < history.length) {
    index++;
    rebuild(index);
    status.innerText = "Ход: " + history[index - 1];
  }
}

function prevMove() {
  if (index > 0) {
    index--;
    rebuild(index);
    status.innerText = "Назад: " + index;
  }
}

function resetGame() {
  index = 0;
  rebuild(0);
  status.innerText = "Сброс";
}

/* ===== BOOKS ===== */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

select.onchange = () => loadPGN(select.value);

loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

</script>
