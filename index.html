<div>
  <select id="bookSelect"></select>
</div>

<div id="board" style="width:420px;margin-top:20px;"></div>
<div id="info"></div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/css/chessboard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/js/chessboard.min.js"></script>

<script>

const books = {
  "1001 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/1001_minis.pgn",
  "1002 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/1002_minis.pgn",
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "100 Endgame Studies": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_endgame_studies.pgn",
  "200 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/200_minis_du_mont.pgn",
  "600 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/600_minis.pgn",
  "700 Minis": "https://raw.githubusercontent.com/Serhiis21/Chess/main/700_minis.pgn",
  "Alekhine": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Alekhine.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

const select = document.getElementById("bookSelect");
const info = document.getElementById("info");

let game = new Chess();
let board = Chessboard('board', 'start');

/* ================= BOOKS ================= */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

/* ================= LOAD SAFE ================= */
select.onchange = async () => {

  info.innerText = "Загрузка...";

  try {
    const res = await fetch(select.value);
    const text = await res.text();

    const first = text.split(/\n\n(?=\[Event)/)[0];

    game.reset();

    const ok = game.load_pgn(first);

    if (!ok) {
      info.innerText = "Ошибка PGN (пропущено)";
      board.position("start");
      return;
    }

    board.position(game.fen());

    info.innerText = "OK";

  } catch (e) {
    console.log(e);
    info.innerText = "Ошибка загрузки файла";
    board.position("start");
  }
};

select.dispatchEvent(new Event("change"));

</script>
