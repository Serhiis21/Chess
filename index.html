<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шахматная библиотека</title>
</head>

<body style="font-family:Arial; max-width:800px; margin:auto; padding:20px;">

<h2>♟ Шахматная библиотека</h2>

<input id="search" placeholder="Поиск книги..." style="width:100%; padding:8px; margin-bottom:10px;">

<div id="books"></div>

<script>

// 📚 КНИГИ
const books = [
  {
    name: "Сицилианская защита",
    url: "https://drive.google.com/uc?export=download&id=1L7ZQMWWP4Jdlw5SpZw6gl9eEkDUob2wb"
  },
  {
    name: "Испанская партия",
    url: "#"
  },
  {
    name: "Французская защита",
    url: "#"
  }
];

const booksDiv = document.getElementById("books");
const search = document.getElementById("search");

// 📚 рендер
function render(list) {
  booksDiv.innerHTML = "";

  list.forEach(b => {
    const div = document.createElement("div");

    div.style = `
      padding:10px;
      border:1px solid #ddd;
      margin-bottom:6px;
      cursor:pointer;
      border-radius:6px;
    `;

    div.innerHTML = "📘 " + b.name;

    div.onclick = () => {
      if (b.url === "#") {
        alert("Файл пока не добавлен");
      } else {
        window.open(b.url, "_blank");
      }
    };

    booksDiv.appendChild(div);
  });
}

// 🔍 поиск
search.oninput = () => {
  const q = search.value.toLowerCase();
  render(books.filter(b => b.name.toLowerCase().includes(q)));
};

// старт
render(books);

</script>

</body>
</html>
