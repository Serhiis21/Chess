<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Working</title>

<script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0/chess.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #333;
}

.square {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

.white { background: #f0d9b5; }
.black { background: #b58863; }
</style>

</head>

<body>

<h2>♟ Chess Board (No CDN dependency)</h2>

<div id="board" class="board"></div>

<script>

const boardEl = document.getElementById("board");

/* стартовая позиция */
const start = [
  "♜","♞","♝","♛","♚","♝","♞","♜",
  "♟","♟","♟","♟","♟","♟","♟","♟",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "♙","♙","♙","♙","♙","♙","♙","♙",
  "♖","♘","♗","♕","♔","♗","♘","♖"
];

function draw() {
  boardEl.innerHTML = "";

  for (let i = 0; i < 64; i++) {
    const sq = document.createElement("div");
    sq.className = "square " + ((Math.floor(i/8)+i)%2 ? "black" : "white");
    sq.textContent = start[i];
    boardEl.appendChild(sq);
  }
}

draw();

</script>

</body>
</html>
