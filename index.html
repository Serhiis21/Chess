<div style="font-family:Arial; font-weight:bold; margin-bottom:10px;">
  ♟ Шахматная библиотека
</div>

<input id="search" placeholder="Поиск книги..." style="width:100%; padding:6px; margin-bottom:10px;">

<div id="books"></div>

<script>

const books = [
  {
    name: "Сицилианская защита",
    url: "https://drive.google.com/uc?export=download&id=1L7ZQMWWP4Jdlw5SpZw6gl9eEkDUob2wb"
  },
  {
    name: "Испанская партия",
    url: "#"
  }
];

const booksDiv = document.getElementById("books");
const search = document.getElementById("search");

// 📚 рендер списка
function render(list) {
  booksDiv.innerHTML = "";

  list.forEach(b => {
    const div = document.createElement("div");

    div.innerHTML = `
      <div style="padding:8px; border:1px solid #ddd; margin-bottom:5px; cursor:pointer;">
        📘 ${b.name}
      </div>
    `;

    div.onclick = () => {
      if (b.url === "#") {
        alert("Файл не задан");
        return;
      }
      window.open(b.url, "_blank");
    };

    booksDiv.appendChild(div);
  });
}

// 🔍 поиск
search.oninput = () => {
  const q = search.value.toLowerCase();
  render(books.filter(b => b.name.toLowerCase().includes(q)));
};

// старт
render(books);

</script>
