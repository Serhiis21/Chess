<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess PGN REAL</title>

<style>
body { font-family: Arial; padding: 20px; }

.board {
  width: 400px;
  height: 400px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 2px solid #222;
}

.cell {
  width: 50px;
  height: 50px;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.w { background: #f0d9b5; }
.b { background: #b58863; }

button { margin: 5px; }
select { margin: 10px 0; width: 420px; }
</style>
</head>

<body>

<h2>♟ REAL PGN Viewer</h2>

<div class="board" id="board"></div>

<h3>📚 Книги</h3>
<select id="bookSelect"></select>

<div>
  <button onclick="prevMove()">⏮</button>
  <button onclick="nextMove()">▶</button>
  <button onclick="resetGame()">⟲</button>
</div>

<div id="status"></div>

<!-- 🔥 НАСТОЯЩИЙ ДВИЖОК -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>

const boardEl = document.getElementById("board");
const status = document.getElementById("status");
const select = document.getElementById("bookSelect");

const books = {
  "100 Best Games": "https://raw.githubusercontent.com/Serhiis21/Chess/main/100_best_games.pgn",
  "Capablanca": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Capablanca.pgn",
  "Chigorin": "https://raw.githubusercontent.com/Serhiis21/Chess/main/Chigorin.pgn"
};

let game = new Chess();
let history = [];
let index = 0;

/* draw board */
function draw() {
  const board = game.board();
  boardEl.innerHTML = "";

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {

      const cell = document.createElement("div");

      const isBlack = (r + c) % 2;
      cell.className = "cell " + (isBlack ? "b" : "w");

      const piece = board[r][c];
      cell.textContent = piece ? getSymbol(piece) : "";

      boardEl.appendChild(cell);
    }
  }
}

function getSymbol(p) {
  const map = {
    p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚"
  };

  return p.color === "w"
    ? map[p.type].replace("♟","♙").replace("♜","♖").replace("♞","♘").replace("♝","♗").replace("♛","♕").replace("♚","♔")
    : map[p.type];
}

/* load PGN */
async function loadPGN(url) {
  status.innerText = "Загрузка...";

  const res = await fetch(url);
  const text = await res.text();

  game.reset();
  game.load_pgn(text);

  history = game.history();
  index = 0;

  game.reset();

  status.innerText = "Ходов: " + history.length;
  draw();
}

/* controls */
function nextMove() {
  if (index < history.length) {
    game.move(history[index]);
    index++;
    draw();
    status.innerText = "Ход: " + history[index-1];
  }
}

function prevMove() {
  game.reset();
  index = 0;

  for (let i = 0; i < Math.max(0, index - 1); i++) {
    game.move(history[i]);
  }

  draw();
}

function resetGame() {
  game.reset();
  index = 0;
  draw();
}

/* books */
for (let b in books) {
  let o = document.createElement("option");
  o.value = books[b];
  o.textContent = b;
  select.appendChild(o);
}

select.onchange = () => loadPGN(select.value);

loadPGN(select.value);

window.nextMove = nextMove;
window.prevMove = prevMove;
window.resetGame = resetGame;

</script>

</body>
</html>
