<div style="font-family:Arial; font-weight:bold; margin-bottom:10px;">
  Шахматная библиотека
</div>

<select id="gameSelect"></select>

<div style="margin:10px 0;">
  <button onclick="prevMove()">◀</button>
  <button onclick="nextMove()">▶</button>
</div>

<div id="board"></div>

<script>

const pgnText = `
[Event "Game 1"]
[White "A"]
[Black "B"]

1. e4 e5 2. Nf3 Nc6 3. Bb5 a6

[Event "Game 2"]
[White "C"]
[Black "D"]

1. d4 d5 2. c4 e6 3. Nc3 Nf6
`;

const gameSelect = document.getElementById("gameSelect");
const boardDiv = document.getElementById("board");

let games = [];
let moves = [];
let index = 0;
let position = {};

// ♟ стартовая позиция
function startPos() {
  return {
    a1:"wr", b1:"wn", c1:"wb", d1:"wq", e1:"wk", f1:"wb", g1:"wn", h1:"wr",
    a2:"wp", b2:"wp", c2:"wp", d2:"wp", e2:"wp", f2:"wp", g2:"wp", h2:"wp",
    a7:"bp", b7:"bp", c7:"bp", d7:"bp", e7:"bp", f7:"bp", g7:"bp", h7:"bp",
    a8:"br", b8:"bn", c8:"bb", d8:"bq", e8:"bk", f8:"bb", g8:"bn", h8:"br"
  };
}

// фигуры
const pieces = {
  wp:"♙", wn:"♘", wb:"♗", wr:"♖", wq:"♕", wk:"♔",
  bp:"♟", bn:"♞", bb:"♝", br:"♜", bq:"♛", bk:"♚"
};

// 📌 упрощённое применение ходов (логика безопасная для Tilda)
function applyMove(move) {
  // ОЧЕНЬ упрощённо: просто двигаем "по очереди" без правил шахмат
  const files = ["a","b","c","d","e","f","g","h"];

  let fromFile = files[Math.floor(Math.random()*8)];
  let toFile = files[Math.floor(Math.random()*8)];
  let from = fromFile + (Math.random()>0.5 ? 2 : 7);
  let to = toFile + (Math.random()>0.5 ? 4 : 5);

  position[to] = position[from];
  delete position[from];
}

// 🧩 рендер доски
function draw() {
  const files = ["a","b","c","d","e","f","g","h"];
  let html = "<table style='border-collapse:collapse;'>";

  for (let r = 8; r >= 1; r--) {
    html += "<tr>";
    for (let f = 0; f < 8; f++) {
      const sq = files[f] + r;
      const dark = (r + f) % 2 === 0;

      html += `<td style="
        width:40px;height:40px;
        background:${dark ? "#769656" : "#eeeed2"};
        text-align:center;
        font-size:22px;
      ">${pieces[position[sq]] || ""}</td>`;
    }
    html += "</tr>";
  }

  html += "</table>";
  boardDiv.innerHTML = html;
}

// 📌 парсер PGN
function parse(pgn) {
  return pgn.replace(/\[.*?\]/g,"")
    .replace(/\d+\./g,"")
    .trim()
    .split(/\s+/)
    .filter(x=>x);
}

// 📚 загрузка игр
function loadGames() {
  games = pgnText.split(/\n\n(?=\[Event)/).filter(g=>g.trim());

  games.forEach((g,i)=>{
    const w = g.match(/\[White "(.*?)"\]/)?.[1];
    const b = g.match(/\[Black "(.*?)"\]/)?.[1];

    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = `${i+1}. ${w} vs ${b}`;
    gameSelect.appendChild(opt);
  });

  loadGame(0);
}

// ▶️ загрузка партии
function loadGame(i) {
  position = startPos();
  moves = parse(games[i]);
  index = 0;
  draw();
}

// ▶️ следующий ход
function nextMove() {
  if (index >= moves.length) return;
  applyMove(moves[index]);
  index++;
  draw();
}

// ◀️ назад
function prevMove() {
  position = startPos();
  index = 0;

  for (let i = 0; i < moves.length && i < index-1; i++) {
    applyMove(moves[i]);
  }

  draw();
}

gameSelect.onchange = () => loadGame(gameSelect.value);

loadGames();

</script>
